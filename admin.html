<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="NinjaWFC admin tools for live room moderation.">
    <meta name="keywords" content="NinjaWFC, Admin, Mario Kart Wii">
    <meta name="author" content="ImZeraora">
    <title>NinjaWFC Admin</title>
    <link rel="icon" href="favicon.png">
    <link rel="stylesheet" href="NinjaWFC.css">
    <script>
        var page = "admin.html";
    </script>
    <script type="text/javascript" src="time.js"></script>
    <style>
        #adminContainer {
            max-width: 1100px;
            margin: 250px auto 40px auto;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .admin-card {
            background: #ffffff;
            border: 3px solid black;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .admin-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            margin-bottom: 10px;
        }

        .admin-row label {
            font-weight: bold;
        }

        .admin-row input {
            padding: 8px;
            border: 2px solid #381460;
            border-radius: 8px;
            font-family: 'Roboto Mono', monospace;
        }

        .admin-button {
            background: #381460;
            color: #ffffff;
            border: 2px solid black;
            border-radius: 10px;
            padding: 8px 12px;
            cursor: pointer;
            font-family: 'Roboto Mono', monospace;
            font-weight: bold;
        }

        .admin-button:hover {
            background: #4c2180;
        }

        .ban-button {
            background: #8f1b1b;
        }

        .ban-button:hover {
            background: #aa2222;
        }

        #adminMessage {
            font-weight: bold;
            margin-top: 8px;
            min-height: 24px;
        }

        .room-table {
            margin-bottom: 16px;
        }

        .room-table .action-cell {
            white-space: nowrap;
        }

        .room-table .action-cell button {
            margin-right: 8px;
            margin-bottom: 4px;
        }
    </style>
</head>

<body id="body">
    <header id="header">
        <center>
            <h2 id="NinjaWFCTitle"><a href="http://www.ninjawfc.com/" id="nocolorlinks">NinjaWFC</a></h2>
        </center>
        <img src="logo.png" id="logo-home">
        <p id="timestamp"></p>
        <center>
            <div>
                <ul id="nav">
                    <li id="nav1"><a href="http://www.ninjawfc.com" id="nocolorlinks">Home Page</a></li>
                    <li id="nav2"><a href="http://www.ninjawfc.com/error.html" id="nocolorlinks">Error Codes</a></li>
                    <li id="nav3"><a href="http://www.ninjawfc.com/stats.html" id="nocolorlinks">MKW Stats</a></li>
                </ul>
            </div>
        </center>
        <p id="NinjaWFCForm"><a href="https://forms.gle/DSQSFC7Rs6H41Fyp9" id="nocolorlinks">Requests?</a></p>
    </header>

    <main id="adminContainer">
        <h2 id="tableStats">MKW Admin Room Tools</h2>

        <div class="admin-card">
            <div class="admin-row">
                <label for="passwordInput">Admin Password:</label>
                <input type="password" id="passwordInput" placeholder="Enter admin secret">
                <label for="passwordToggle">Show</label>
                <input type="checkbox" id="passwordToggle">
                <button class="admin-button" id="savePasswordBtn" type="button">Save Password</button>
                <button class="admin-button" id="refreshRoomsBtn" type="button">Refresh Rooms</button>
            </div>
            <p id="adminMessage"></p>
        </div>

        <div id="groupsContainer">
            <div class="stats-status">Loading rooms...</div>
        </div>
    </main>

    <img src="" id="monthimg">

    <script>
        (function () {
            const groupsContainer = document.getElementById('groupsContainer');
            const passwordInput = document.getElementById('passwordInput');
            const passwordToggle = document.getElementById('passwordToggle');
            const savePasswordBtn = document.getElementById('savePasswordBtn');
            const refreshRoomsBtn = document.getElementById('refreshRoomsBtn');
            const adminMessage = document.getElementById('adminMessage');
            const protocol = window.location.protocol.startsWith('https') ? 'https://' : 'http://';

            loadSavedPassword();

            passwordToggle.addEventListener('change', function () {
                passwordInput.type = passwordToggle.checked ? 'text' : 'password';
            });

            savePasswordBtn.addEventListener('click', function () {
                localStorage.setItem('savedPassword', passwordInput.value || '');
                setMessage('Password saved locally.', false);
            });

            refreshRoomsBtn.addEventListener('click', function () {
                fetchRooms();
            });

            groupsContainer.addEventListener('click', async function (event) {
                const kickBtn = event.target.closest('.kick-btn');
                const banBtn = event.target.closest('.ban-btn');

                if (!kickBtn && !banBtn) {
                    return;
                }

                const secret = passwordInput.value.trim();
                if (!secret) {
                    setMessage('Please enter admin password first.', true);
                    return;
                }

                const fc = (kickBtn || banBtn).getAttribute('data-fc') || '';
                const playerName = (kickBtn || banBtn).getAttribute('data-name') || 'Unknown';
                const pid = fcToPid(fc);

                if (pid === null) {
                    setMessage('Invalid friend code for ' + playerName + '.', true);
                    return;
                }

                if (kickBtn) {
                    const reasonInput = prompt('Kick reason for ' + playerName + ':', 'No reason provided');
                    if (reasonInput === null) {
                        return;
                    }

                    await kickPlayer({
                        secret: secret,
                        pid: pid,
                        fc: fc,
                        reason: reasonInput.trim() || 'No reason provided'
                    });
                    return;
                }

                if (banBtn) {
                    const daysInput = prompt('Ban days for ' + playerName + ':', '0');
                    if (daysInput === null) {
                        return;
                    }

                    const hoursInput = prompt('Ban hours for ' + playerName + ':', '0');
                    if (hoursInput === null) {
                        return;
                    }

                    const minutesInput = prompt('Ban minutes for ' + playerName + ':', '15');
                    if (minutesInput === null) {
                        return;
                    }

                    const reasonInput = prompt('Ban reason for ' + playerName + ':', 'Cheating');
                    if (reasonInput === null) {
                        return;
                    }

                    const moderatorInput = prompt('Moderator username:', 'Anonymous');
                    if (moderatorInput === null) {
                        return;
                    }

                    await banPlayer({
                        secret: secret,
                        pid: pid,
                        fc: fc,
                        days: toNumber(daysInput, 0),
                        hours: toNumber(hoursInput, 0),
                        minutes: toNumber(minutesInput, 15),
                        reason: reasonInput.trim() || 'Cheating',
                        moderator: moderatorInput.trim() || 'Anonymous'
                    });
                }
            });

            async function fetchRooms() {
                groupsContainer.innerHTML = '<div class="stats-status">Loading rooms...</div>';

                try {
                    const response = await fetch('http://nas.ninjawfc.com/api/groups?game=mariokartwii');
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }

                    const groups = await response.json();
                    renderRooms(groups);
                } catch (error) {
                    console.error('Error fetching room data:', error);
                    groupsContainer.innerHTML = '<div class="stats-status stats-error">Failed to load room data.</div>';
                }
            }

            function renderRooms(groups) {
                groupsContainer.innerHTML = '';

                if (!groups || groups.length === 0) {
                    groupsContainer.innerHTML = '<div class="stats-status">No active rooms found.</div>';
                    return;
                }

                groups.forEach(function (group) {
                    const table = document.createElement('table');
                    table.className = 'room-table';

                    const createdDate = new Date(group.created);
                    const roomOpenDuration = timeSince(createdDate);
                    const rkLabel = getRkLabel(group.rk);
                    const players = Object.values(group.players || {});

                    table.innerHTML =
                        '<thead>' +
                        '<tr><th colspan="5">Room ID: ' + escapeHtml(group.id || 'Unknown') + '</th></tr>' +
                        '</thead>' +
                        '<tbody>' +
                        '<tr>' +
                        '<td class="label-cell">Region (RK)</td>' +
                        '<td colspan="4">' + escapeHtml(rkLabel) + '</td>' +
                        '</tr>' +
                        '<tr>' +
                        '<td class="label-cell">Open For</td>' +
                        '<td colspan="4">' + escapeHtml(roomOpenDuration) + '</td>' +
                        '</tr>' +
                        '<tr class="players-header-row">' +
                        '<th>Player Name</th>' +
                        '<th>Friend Code</th>' +
                        '<th>EV</th>' +
                        '<th>EB</th>' +
                        '<th>Actions</th>' +
                        '</tr>' +
                        '</tbody>';

                    const body = table.querySelector('tbody');

                    if (players.length === 0) {
                        const emptyRow = document.createElement('tr');
                        emptyRow.className = 'no-players-row';
                        emptyRow.innerHTML = '<td colspan="5">No players in this room.</td>';
                        body.appendChild(emptyRow);
                    } else {
                        players.forEach(function (player) {
                            const row = document.createElement('tr');
                            const safeName = player.name || 'Unknown';
                            const safeFc = player.fc || 'Unknown';
                            const safeEv = player.ev || 'N/A';
                            const safeEb = player.eb || 'N/A';

                            row.innerHTML =
                                '<td>' + escapeHtml(safeName) + '</td>' +
                                '<td>' + escapeHtml(safeFc) + '</td>' +
                                '<td>' + escapeHtml(safeEv) + '</td>' +
                                '<td>' + escapeHtml(safeEb) + '</td>' +
                                '<td class="action-cell">' +
                                '<button type="button" class="admin-button kick-btn" data-fc="' + escapeHtmlAttribute(safeFc) + '" data-name="' + escapeHtmlAttribute(safeName) + '">Kick</button>' +
                                '<button type="button" class="admin-button ban-button ban-btn" data-fc="' + escapeHtmlAttribute(safeFc) + '" data-name="' + escapeHtmlAttribute(safeName) + '">Ban</button>' +
                                '</td>';

                            body.appendChild(row);
                        });
                    }

                    groupsContainer.appendChild(table);
                });
            }

            async function kickPlayer(options) {
                const payload = {
                    secret: options.secret,
                    reason: options.reason,
                    fcInputValue: options.fc,
                    pid: parseInt(options.pid, 10)
                };

                try {
                    const response = await fetch(protocol + 'api.ninjawfc.com/api/kick', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(payload)
                    });

                    const text = await response.text();
                    if (!response.ok) {
                        throw new Error('Server error ' + response.status + ': ' + text);
                    }

                    setMessage(options.fc + ' has been kicked.', false);
                    fetchRooms();
                } catch (error) {
                    console.error('Kick error:', error);
                    setMessage('Error during kick action: ' + error.message, true);
                }
            }

            async function banPlayer(options) {
                const payload = {
                    secret: options.secret,
                    reason: options.reason,
                    pid: parseInt(options.pid, 10),
                    days: options.days,
                    hours: options.hours,
                    minutes: options.minutes,
                    tos: true,
                    fcInputValue: options.fc,
                    moderator: options.moderator
                };

                try {
                    const response = await fetch(protocol + 'api.ninjawfc.com/api/ban', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(payload)
                    });

                    const text = await response.text();
                    if (!response.ok) {
                        throw new Error('Server error ' + response.status + ': ' + text);
                    }

                    setMessage(options.fc + ' has been banned for ' + options.days + 'd ' + options.hours + 'h ' + options.minutes + 'm.', false);
                    fetchRooms();
                } catch (error) {
                    console.error('Ban error:', error);
                    setMessage('Error during ban action: ' + error.message, true);
                }
            }

            function fcToPid(fc) {
                const fcInput = String(fc).replace(/-/g, '');
                if (fcInput.length !== 12 || !/^[0-9]+$/.test(fcInput)) {
                    return null;
                }
                const fcNumber = parseInt(fcInput, 10);
                return fcNumber & 0xffffffff;
            }

            function getRkLabel(rk) {
                if (rk === 'vs_20000' || rk === 'bt_20000') {
                    return rk + " (Zeraora's Stream Essentials)";
                }
                if (rk === 'vs_20001' || rk === 'bt_20001') {
                    return rk + ' (Mario Kart Mayhem)';
                }
                return rk || 'Unknown';
            }

            function timeSince(date) {
                const seconds = Math.floor((new Date() - date) / 1000);
                const minutes = Math.floor(seconds / 60);
                const hours = Math.floor(minutes / 60);

                if (hours > 0) {
                    return hours + 'h ' + (minutes % 60) + 'm';
                }
                if (minutes > 0) {
                    return minutes + 'm';
                }
                return seconds + 's';
            }

            function toNumber(value, fallback) {
                const parsed = parseInt(value, 10);
                return Number.isNaN(parsed) ? fallback : Math.max(0, parsed);
            }

            function setMessage(message, isError) {
                adminMessage.textContent = message;
                adminMessage.style.color = isError ? '#a00000' : '#0b640b';
            }

            function loadSavedPassword() {
                const savedPassword = localStorage.getItem('savedPassword');
                if (savedPassword) {
                    passwordInput.value = savedPassword;
                }
            }

            function escapeHtml(value) {
                return String(value)
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#39;');
            }

            function escapeHtmlAttribute(value) {
                return escapeHtml(value);
            }

            fetchRooms();
            setInterval(fetchRooms, 60000);
        })();
    </script>
</body>

</html>
